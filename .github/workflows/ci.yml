#on: 'pull_request'
on:
  push:
    branches:
      - OP-2168-bump-gha-actions

jobs:
  CI:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: 18.x
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 8.6.12

      - run: pnpm install
      - run: pnpm lint
      - run: pnpm test
